version: "3.9"

name: rf-studio

networks:
  rf-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

services:

  # =========================
  # EDGE GATEWAY
  # =========================
  edge-gateway:
    build: ../../apps/edge-gateway
    container_name: edge-gateway
    restart: unless-stopped
    ports:
      - "80:3000"
    networks:
      - rf-net
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # =========================
  # API GATEWAY
  # =========================
  api-gateway:
    build: ../../gateway/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - rf-net
    depends_on:
      - redis
      - postgres

  # =========================
  # REALTIME GATEWAY
  # =========================
  realtime-gateway:
    build: ../../gateway/realtime-gateway
    container_name: realtime-gateway
    restart: unless-stopped
    networks:
      - rf-net
    depends_on:
      - redis

  # =========================
  # SERVICES
  # =========================
  media-service:
    build: ../../services/media-service
    restart: unless-stopped
    networks: [rf-net]

  playback-service:
    build: ../../services/playback-service
    restart: unless-stopped
    networks: [rf-net]
    depends_on:
      - lavalink-primary

  queue-service:
    build: ../../services/queue-service
    restart: unless-stopped
    networks: [rf-net]

  lyrics-service:
    build: ../../services/lyrics-provider-service
    restart: unless-stopped
    networks: [rf-net]

  karaoke-service:
    build: ../../services/karaoke-session-service
    restart: unless-stopped
    networks: [rf-net]

  quiz-service:
    build: ../../services/quiz-service
    restart: unless-stopped
    networks: [rf-net]

  # =========================
  # REDIS CLUSTER (STATE STORE)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [rf-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================
  # POSTGRES (STATE PERSISTENCE)
  # =========================
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rf
      POSTGRES_PASSWORD: rfpass
      POSTGRES_DB: rfstudio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [rf-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rf"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================
  # LAVALINK CLUSTER
  # =========================
  lavalink-primary:
    image: fredboat/lavalink:4
    container_name: lavalink-primary
    restart: unless-stopped
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=changeme
    networks: [rf-net]

  lavalink-backup:
    image: fredboat/lavalink:4
    container_name: lavalink-backup
    restart: unless-stopped
    environment:
      - SERVER_PORT=2334
      - LAVALINK_SERVER_PASSWORD=changeme
    networks: [rf-net]

  # =========================
  # MONITORING STACK
  # =========================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [rf-net]

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks: [rf-net]

  # =========================
  # REDIS INSPECTOR (OPTIONAL)
  # =========================
  redis-commander:
    image: rediscommander/redis-commander
    container_name: redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks: [rf-net]