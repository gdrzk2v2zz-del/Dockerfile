version: "3.9"

networks:
  rf-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

# =========================
# CORE INFRA
# =========================
services:

  redis:
    image: redis:7-alpine
    container_name: rf-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - rf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    container_name: rf-postgres
    environment:
      POSTGRES_USER: rf
      POSTGRES_PASSWORD: rfpass
      POSTGRES_DB: rfstudio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rf"]
      interval: 10s
      timeout: 3s
      retries: 5

# =========================
# EVENT BUS (Redis-based abstraction layer)
# =========================
  event-bus:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../distributed-event-bus:/app
    command: ["node", "index.js"]
    networks:
      - rf-net
    depends_on:
      - redis
    restart: unless-stopped

# =========================
# LAVALINK PRIMARY
# =========================
  lavalink-primary:
    image: eclipse-temurin:17-jre
    container_name: lavalink-primary
    networks:
      - rf-net
    volumes:
      - ../lavalink-cluster/primary:/app
    working_dir: /app
    command: ["java", "-jar", "Lavalink.jar"]
    restart: unless-stopped
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2333/version"]
      interval: 10s
      timeout: 3s
      retries: 5

# =========================
# LAVALINK BACKUP (failover)
# =========================
  lavalink-backup:
    image: eclipse-temurin:17-jre
    container_name: lavalink-backup
    networks:
      - rf-net
    volumes:
      - ../lavalink-cluster/backup:/app
    working_dir: /app
    command: ["java", "-jar", "Lavalink.jar"]
    restart: unless-stopped
    ports:
      - "2334:2333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2333/version"]
      interval: 10s
      timeout: 3s
      retries: 5

# =========================
# API GATEWAY
# =========================
  api-gateway:
    build: ../gateway/api-gateway
    networks:
      - rf-net
    depends_on:
      - redis
      - postgres
      - event-bus
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://rf:rfpass@postgres:5432/rfstudio

# =========================
# EDGE GATEWAY
# =========================
  edge-gateway:
    build: ../gateway/edge-gateway
    networks:
      - rf-net
    depends_on:
      - api-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"

# =========================
# DISCORD ORCHESTRATOR BOT
# =========================
  discord-orchestrator:
    build: ../apps/discord-orchestrator
    networks:
      - rf-net
    depends_on:
      - lavalink-primary
      - lavalink-backup
      - redis
    restart: unless-stopped
    environment:
      LAVALINK_PRIMARY: http://lavalink-primary:2333
      LAVALINK_BACKUP: http://lavalink-backup:2333
      REDIS_URL: redis://redis:6379

# =========================
# MUSIC / QUIZ / HYBRID BOT
# =========================
  discord-music:
    build: ../apps/discord-music-gateway
    networks:
      - rf-net
    depends_on:
      - discord-orchestrator
    restart: unless-stopped

  discord-quiz:
    build: ../apps/discord-quiz-gateway
    networks:
      - rf-net
    depends_on:
      - discord-orchestrator
    restart: unless-stopped