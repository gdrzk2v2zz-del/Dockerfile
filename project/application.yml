server:
port: 2333
address: 0.0.0.0
shutdown: graceful

=====================================================

LAVALINK

=====================================================

lavalink:
server:

# =================================================
# AUTH
# =================================================
password: ${LAVALINK_PASSWORD}
# =================================================
# AUDIO SOURCES
# =================================================
sources:
  youtube: true
  soundcloud: true
  http: true
  # disabled (stability / lower attack surface)
  bandcamp: false
  twitch: false
  vimeo: false
  local: false
# =================================================
# PERFORMANCE / AUDIO STABILITY
# =================================================
# 音切れ対策
bufferDurationMs: 400
# Discord送信バッファ
frameBufferDurationMs: 5000
# opus quality (10 = high)
opusEncodingQuality: 10
# CPU削減重視
resamplingQuality: LOW
# =================================================
# LOAD CONTROL
# =================================================
# playlist爆撃対策
youtubePlaylistLoadLimit: 6
# player update頻度
playerUpdateInterval: 5
# 検索負荷削減
youtubeSearchEnabled: false

=====================================================

METRICS

=====================================================

metrics:
prometheus:
enabled: true
endpoint: /metrics
collectDefaultMetrics: true

=====================================================

REST API

=====================================================

rest:
enabled: true

=====================================================

HTTP

=====================================================

http:
enabled: true
bindAddress: 0.0.0.0
port: 2333

=====================================================

LOGGING

=====================================================

logging:
level:
root: WARN
lavalink: INFO

=====================================================

PLUGINS

=====================================================

plugins:
youtube:
enabled: true

dependency形式で追加する場合

- dependency: “com.example:plugin:1.0.0”
